version: "3"

services:
  xrpld:
    image: rippleci/xrpld:develop
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./.ci-config:/etc/xrpld:ro
    ports:
      - "5005:5005"
      - "6006:6006"
    command: ["--standalone"]
    healthcheck:
      test: ["CMD", "xrpld", "server_info"]
      interval: 5s
      timeout: 2s
      retries: 10
