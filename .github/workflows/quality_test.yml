on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main
      - dev
  schedule:
    - cron: '0 0 * * *'

name: Quality Check

jobs:
  quality_check:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit
