on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main

name: Quality

jobs:
  quality_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Clippy lint
        run: cargo clippy --all-features -- -D warnings
