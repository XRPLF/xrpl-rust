on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

name: Integration Test

env:
  # rippled binary was renamed to xrpld; use the new image name.
  # Tracks xrpl.js PR #3270 (https://github.com/XRPLF/xrpl.js/pull/3270).
  XRPLD_DOCKER_IMAGE: rippleci/xrpld:develop

jobs:
  integration_test:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Run xrpld in standalone mode
        run: |
          docker run \
            --detach \
            --rm \
            --publish 5005:5005 \
            --publish 6006:6006 \
            --volume "${{ github.workspace }}/.ci-config/":"/etc/opt/xrpld/" \
            --name xrpld-service \
            ${{ env.XRPLD_DOCKER_IMAGE }} --standalone

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run integration tests with coverage
        run: |
          cargo llvm-cov \
            --release \
            --features std,json-rpc,helpers,integration \
            --test integration_test \
            --lcov \
            --output-path integration-lcov.info \
            -- --test-threads=1
        env:
          RUST_BACKTRACE: 1

      - name: Integration coverage summary
        # Prints the line / region / function percentages so they land in the run log
        # and become trivially observable in PR runs. The `--fail-under-*` gates are
        # intentionally not enabled yet (#297): pick realistic thresholds after a few
        # baseline runs land, matching how `unit_test.yml`'s thresholds were tuned.
        run: cargo llvm-cov report --summary-only

      - name: Upload integration coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-lcov-report
          path: integration-lcov.info

      - name: Dump xrpld logs and stop container
        if: always()
        run: |
          docker logs xrpld-service 2>&1 || echo "::warning::xrpld-service container not present for logs"
          docker stop xrpld-service 2>/dev/null || true
