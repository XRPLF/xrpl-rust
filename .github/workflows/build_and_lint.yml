on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main
      - dev

name: Build & Lint

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            features: ""
          - name: no-default
            features: "--no-default-features"
          - name: no_std
            features: "--no-default-features --features embassy-rt,core,wallet,models,helpers,websocket,json-rpc"
          - name: core-only
            features: "--no-default-features --features core"
          - name: wallet-only
            features: "--no-default-features --features wallet"
          - name: models-only
            features: "--no-default-features --features models"
          - name: helpers-only
            features: "--no-default-features --features websocket,json-rpc,helpers,tokio-rt"
          - name: websocket-only
            features: "--no-default-features --features websocket"
          - name: json-rpc-only
            features: "--no-default-features --features json-rpc"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ matrix.name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.name }}-

      - name: Build (${{ matrix.name }})
        run: cargo build --release ${{ matrix.features }}

