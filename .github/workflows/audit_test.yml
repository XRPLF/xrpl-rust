on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

name: Audit

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit
